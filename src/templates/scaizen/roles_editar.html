{% extends 'scaizen.html' %}
{% block title %}EDITAR ROL{% endblock %}
{% block tables %}
  <div class="formulario" style="width: 600px;">
    <div style="display: flex; align-items: center;">
        <button onclick="goBack()" class="btn btn-outline-success btn-sm ver-btn" style="margin-right: 10px;">
          <i class="fa-solid fa-circle-arrow-left"></i>
        </button>
        <div>
            <label class="titulo" style="text-transform: uppercase; margin: 0;">EDITAR ROL</label>
            <p class="dir_vista">Catalogo/Rol Editar</p>
        </div>
    </div>  
  </div>

<hr class="text-black d-none d-sm-block" />

<form id="userForm" method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="formulario_alta">
    <div class="form-group row align-items-center mb-3">
      <label class="col-2 col-form-label texto-negro" for="user_name">Nombre del Rol:</label>
      <div class="col-10 position-relative">
        <input type="text" id="rol_name" name="rol_name" value="" class="form-control" placeholder="" required>
      </div>
    </div>
    <div class="form-group row align-items-center mb-3">
      <label class="col-2 col-form-label texto-negro" for="informacion">Descripción del Rol:</label>
      <div class="col-10">
          <textarea id="informacion" style="width: 100%; height: 70px; resize: none;" name="informacion" class="form-control texto-negro" placeholder=""></textarea>
      </div>
    </div>
    <div class="text-center mt-4">
      <button type="submit" id="crearorden" class="button_color_alba">
        Editar registro   
      </button>
      <button type="reset" class="button_color_alba">
        Limpiar
      </button>
    </div>
  </div>
</form>
<script>
  function goBack() {
    window.history.back();
  }
</script>
<!-- Asegúrate de incluir Font Awesome para los iconos -->
<script>
  function resetSelect() {
      document.getElementById('role').selectedIndex = 0;
      document.getElementById('role-error').style.display = 'none';
  }
</script>

<script>
  $(document).ready(function () {
  // Recuperar el parámetro id de la URL
  var urlParams = new URLSearchParams(window.location.search);
  var actualizar = urlParams.get('id');
  console.log("ID Cliente:", actualizar);

  // Obtener el token CSRF
  var csrfToken = $('input[name="csrf_token"]').val();
  console.log("CSRF Token:", csrfToken);

  // Configurar los datos del formulario
  var formData = {
      'csrf_token': csrfToken,
      'actualizar': actualizar
  };

  // Realizar la solicitud AJAX
  $.ajax({
      url: "{{ url_for('app_scaizen.app_catalogo.roles_editar') }}",
      data: formData,
      type: 'POST',
      success: function(response) {
          console.log(response.datos_rol_especifico)
          if (response.datos_rol_especifico) {
              const rol = response.datos_rol_especifico;
              $("#rol_name").val(rol.NombreRol);
              $("#informacion").val(rol.Descripcion);
          } else {
              console.error("No se encontraron datos de la estacion.");
          }
      },
      error: function(xhr, status, error) {
          console.error("Error en la solicitud AJAX:", error);
      }
  });
});
</script>

<script>
  $(document).ready(function () {

    $("#userForm").submit(function(event) {
      event.preventDefault();  // Evita el envío por defecto del formulario

      const rol_name = $("#rol_name").val().trim();
      const informacion = $("#informacion").val().trim();
      const csrfToken = $("input[name='csrf_token']").val().trim();
      var urlParams = new URLSearchParams(window.location.search);
      var actualizar_id = urlParams.get('id');
      const editar = "editar"

      // Validación de rol
      if (!rol_name) {
        $("#role-error").text("Por favor, seleccione un nombre para el rol").show();
        return;
      } else {
        $("#role-error").hide();
      }
      // Envío de datos al servidor
      $.ajax({
        url: "{{ url_for('app_scaizen.app_catalogo.roles_editar') }}",
        type: "POST",
        data: {
          csrf_token: csrfToken,
          rol_name: rol_name,
          informacion: informacion,
          editar: editar,
          actualizar_id:actualizar_id
        },
        beforeSend: function () {
          $("#loader-row").show();  // Mostrar loader durante la solicitud AJAX
        },
        success: function (response) {
          $("#loader-row").hide();  // Ocultar loader al recibir respuesta

          if (response.estatus) {



            var url = "{{ url_for('app_scaizen.app_catalogo.roles_consultar' ) }}";

            window.location.href = url;
            alert("Rol actualizado con éxito");
            $("#userForm")[0].reset();  // Reiniciar formulario después de éxito
          } else {
            alert("Error al actualizado el rol");
          }
        },
        error: function (xhr, status, error) {
          $("#loader-row").hide();  // Ocultar loader en caso de error
          console.error("Error en la solicitud AJAX:", error);
          alert("Hubo un problema al guardar el rol. Por favor, intente de nuevo.");
        }
      });
    });
  });
</script>

{% endblock %}
