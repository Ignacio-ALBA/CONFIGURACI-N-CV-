<script>


    function controlSwitch(id,valor,html){
        let sw=document.getElementById(id);
        if(!sw) return;

        sw.disabled=false;
        sw.checked=valor>0;
        sw.dispatchEvent(new Event("change",{bubbles:true}));
    
        $('#' + html).val(valor);
    }




    
    function clearForm(formulario){
        const div =document.getElementById(formulario)
        //selecciono todos los inputs,slects y textareas
        const campos=div.querySelectorAll("input, select, textarea");

        campos.forEach(campo =>{
            switch(campo.type){
                case "checkbox":
                    campo.checked = false;

                    break;

                case "radio":
                    campo.radio=false;//desmarca los checkbox/radio
                    break;

                case "number":
                    if (campo.id === "No_Productos"){
                        campo.value=1;
                        campo.disabled=true;

                    }else if (campo.id ==="GeolocalizacionLatitud"||
                     campo.id==="GeolocalizacionLongitud"){
                        campo.value="";
                        
                    }else{
                        campo.value=0;//reinicia inputs numericos
                        campo.disabled=true;
                    }
                    break;
                default:
                    campo.value="";//limpia texto y selects
                    campo.selectedIndex= 0;//para los selects,vuelve al originl
                    if (formulario=="controles_volumetricos"){
                        document.getElementById('permisionario').style.display='none';// OCULTAMOS todas las secciones posibles
                        document.getElementById('contratoOasignacion').style.display='none';
                        document.getElementById('usuario').style.display='none';
                    }
                    break;
                }
        })

    }


    function send_map(method, actividad=null,producto=null,terminal=null,medidores=null){
        const csrfToken = $('input[name="csrf_token"]').val();

        return $.ajax({
            url: "{{url_for('app_scaizen.app_configuracion.configuracion')}}",
            type: method,
            headers: {
                'X-CSRFToken': csrfToken
            },
            data: {
                map_actividad: actividad,
                map_producto:producto,
                map_terminal:terminal,
                map_medidores:medidores

            },
            beforeSend: function () {
                $("#loader-row").show();
            }
        }).always(() => {
            $("#loader-row").hide();
        });
    }






    function send_select(method, actividad=null,producto=null,terminal=null,medidores=null,id=null){
        const csrfToken = $('input[name="csrf_token"]').val();

        return $.ajax({
            url: "{{url_for('app_scaizen.app_configuracion.configuracion')}}",
            type: method,
            headers: {
                'X-CSRFToken': csrfToken
            },
            data: {
                id:id,
                actividad: actividad,
                producto:producto,
                terminal:terminal,
                medidores:medidores

            },
            beforeSend: function () {
                $("#loader-row").show();
            }
        }).always(() => {
            $("#loader-row").hide();
        });
    }




    const select_cv = document.getElementById("productoSelect");
    let idCVActual = null;
    select_cv.addEventListener("change",function(){
        var csrfToken = $('input[name="csrf_token"]').val();
        
        var actividad= this.value;
        send_map("POST",  actividad)
            .done(response => {
                if(response.map_actividad && Array.isArray(response.map_actividad) && response.map_actividad.length ){
                        contador_cv=1;

                        const cv = response.map_actividad[0];
                            idCVActual = cv.Id_CV;
                            $("#RfcContribuyente").val(cv.RfcContribuyente);
                            $("#RfcRepresentantelegal").val(cv.RfcContribuyente);
                            $("#RfcProveedor").val(cv.RfcContribuyente);
                            const selectTipo = document.getElementById("tipoCaracter");
                            selectTipo.value = cv.TipoCaracter;
                            // simula selección manual
                            selectTipo.dispatchEvent(new Event("change"));

                            $("#modalidadPermiso").val(cv.ModalidadPermiso);
                            $("#numeroPermiso").val(cv.NumPermiso);
                            $("#numeroContrato").val(cv.NumContratoOAsignacion);
                            $("#instalacionGas").val(cv.InstalacionAlmacenGasNatural);
                            $("#ClaveInstalacion").val(cv.ClaveInstalacion);
                            $("#DescripcionInstalacion").val(cv.DescripcionInstalacion);
                            $("#GeolocalizacionLatitud").val(cv.GeolocalizacionLatitud);
                            $("#GeolocalizacionLongitud").val(cv.GeolocalizacionLongitud);
                            //chec el error de 2/1

    function sendCV(method,formulario, proceso, payload=null,id = null) {
        const body = {
            formulario: formulario,
            proceso: proceso
        };

        if (id !== null) {
            body.id = id;
        }

        if (payload !== null) {
            body.data = payload;
        }
            
        
        return $.ajax({
            url: "{{url_for('app_scaizen.app_configuracion.configuracion')}}",
            type: method,
            headers: {
                'X-CSRFToken': csrfToken
            },
            contentType: "application/json",
            data: method !== "GET" ? JSON.stringify(body) : null,
            beforeSend: function () {
                $("#loader-row").show();
            }
        }).always(() => {
            $("#loader-row").hide();
        });
    }

        let actual_but = contador_local_medicion[counter_measurement].contador;
             
        let limite_previo = contador_local_medicion_limite_previo[counter_measurement].previo;
        let limite_actual = parseInt(document.getElementById(No_input_medicion[counter_measurement].input).value);
        console.log(` ${counter_measurement}`);

        //let button_producto = document.getElementById(add_button_producto[counter_measurement].boton);

        save_button.disabled = save_button_medicion[counter_measurement].status;


        save_button.textContent = `${actual_but} / ${limite_actual}`;

        let deshabilitar;

        //  Regla principal: si alcanza o supera el límite → deshabilitar SIEMPRE
        if (actual_but >= limite_actual) {
            deshabilitar = true;
        } 
        else {
            //  Límite aumentó → habilitar
            if (limite_actual > limite_previo) {
                deshabilitar = false;
            }

            //  Límite disminuyó → deshabilitar hasta que contador < nuevo límite
            else if (limite_actual < limite_previo) {
                deshabilitar = actual_but >= limite_actual;
            }

            // Sin cambios → mantener estado previo
            else {
                deshabilitar = save_button_medicion[counter_measurement].status;
            }
        }

        // Aplicar estado al botón
        save_button.disabled = deshabilitar;
        save_button_medicion[counter_measurement].status = deshabilitar;

        // Actualizar límites
        contador_local_medicion_limite[counter_measurement].limite = limite_actual;
        contador_local_medicion_limite_previo[counter_measurement].previo = limite_actual;
    }
